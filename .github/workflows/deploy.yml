name: Deploy to Cloudflare Pages
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: cd site && npm install && npm run build
      - name: Deploy
        run: npx wrangler pages deploy site/dist --project-name clinicaltrialhub --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: aba0a6722a4510842ca473315a8ba13e
